<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #000010;
    color: #eaf0ff;
    font-family: "Press Start 2P", ui-monospace, monospace;
    overflow: auto;
  }
  #stars { position: fixed; inset: 0; z-index: 0; display: block; pointer-events: none; }
  .content {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 30px; padding: 24px 18px;
  }
  h1 {
    margin: 0; font-size: 1.5rem; line-height: 1.5; color: #bcd0ff;
    text-shadow: 0 0 12px rgba(120,160,255,0.8), 0 0 26px rgba(80,120,255,0.5);
    animation: bob 4.6s ease-in-out infinite; will-change: transform;
  }
  .tagline { font-size: 0.55rem; color: #8ea0d0; letter-spacing: 1px; margin-top: -16px; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @media (prefers-reduced-motion: reduce) { h1 { animation: none; } }

  .games { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; }
  .game-card {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 240px; padding: 26px 18px; text-decoration: none;
    color: #eaf0ff; background: rgba(0,0,20,0.6);
    border: 2px solid #36e2ff; border-radius: 16px;
    box-shadow: 0 0 18px rgba(54,226,255,0.35), inset 0 0 18px rgba(54,226,255,0.1);
    transition: transform .1s ease, box-shadow .2s ease;
  }
  .game-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 0 32px rgba(54,226,255,0.8), inset 0 0 22px rgba(54,226,255,0.2); }
  .game-card .icon { font-size: 2.2rem; line-height: 1; filter: drop-shadow(0 0 10px rgba(54,226,255,0.7)); }
  .game-card .name { font-size: 0.85rem; text-align: center; line-height: 1.5; text-shadow: 0 0 10px rgba(54,226,255,0.7); }
  .game-card .desc { font-size: 0.45rem; color: #9fb0d8; text-align: center; line-height: 1.8; }
  .game-card .go { font-size: 0.5rem; color: #39d98a; text-shadow: 0 0 8px rgba(57,217,138,0.8); margin-top: 4px; }

  /* second card accent (violet) */
  .game-card.alt { border-color: #b18cff; box-shadow: 0 0 18px rgba(150,110,255,0.35), inset 0 0 18px rgba(150,110,255,0.12); }
  .game-card.alt:hover { box-shadow: 0 0 32px rgba(177,140,255,0.8), inset 0 0 22px rgba(150,110,255,0.22); }
  .game-card.alt .icon { filter: drop-shadow(0 0 10px rgba(177,140,255,0.7)); }
  .game-card.alt .name { text-shadow: 0 0 10px rgba(177,140,255,0.7); }

  /* third card accent (amber) */
  .game-card.alt2 { border-color: #ffb43f; box-shadow: 0 0 18px rgba(255,180,63,0.35), inset 0 0 18px rgba(255,180,63,0.12); }
  .game-card.alt2:hover { box-shadow: 0 0 32px rgba(255,180,63,0.8), inset 0 0 22px rgba(255,180,63,0.22); }
  .game-card.alt2 .icon { filter: drop-shadow(0 0 10px rgba(255,180,63,0.7)); }
  .game-card.alt2 .name { text-shadow: 0 0 10px rgba(255,180,63,0.7); }
</style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="content">
    <h1>🕹️ ARCADE</h1>
    <div class="tagline">PICK A GAME</div>
    <div class="games">
      <a class="game-card" href="maze.html">
        <div class="icon">🌌</div>
        <div class="name">CURSOR MAZE</div>
        <div class="desc">STEER A TORCH THROUGH A DARK MAZE</div>
        <div class="go">PLAY ▶</div>
      </a>
      <a class="game-card alt" href="tictactoe.html">
        <div class="icon">⭕</div>
        <div class="name">TIC-TAC-TOE</div>
        <div class="desc">OUTSMART THE AI</div>
        <div class="go">PLAY ▶</div>
      </a>
      <a class="game-card alt2" href="breakout.html">
        <div class="icon">🧱</div>
        <div class="name">BREAKOUT</div>
        <div class="desc">SMASH BLOCKS, GRAB POWER-UPS</div>
        <div class="go">PLAY ▶</div>
      </a>
    </div>
  </div>

<script>
(() => {
  "use strict";
  const starCanvas = document.getElementById("stars");
  const sctx = starCanvas.getContext("2d");
  const ROT_SPEED = 0.00028;
  let stars = [], scx = 0, scy = 0, rot = 0;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  function initStars() {
    const w = window.innerWidth, h = window.innerHeight;
    starCanvas.width = w; starCanvas.height = h;
    scx = w / 2; scy = h / 2;
    const maxR = Math.hypot(w, h) / 2 * 1.15;
    const n = Math.min(520, Math.floor(w * h / 4500));
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        ang: Math.random() * Math.PI * 2,
        rad: Math.sqrt(Math.random()) * maxR,
        size: Math.random() * 1.3 + 0.3,
        base: Math.random() * 0.55 + 0.45,
        tw: Math.random() * Math.PI * 2,
        tws: Math.random() * 0.003 + 0.001,
        glow: Math.random() < 0.05,
      });
    }
  }
  function paintStars(t) {
    const w = starCanvas.width, h = starCanvas.height;
    sctx.clearRect(0, 0, w, h);
    rot += ROT_SPEED;
    for (const s of stars) {
      const a = s.ang + rot;
      const x = scx + s.rad * Math.cos(a), y = scy + s.rad * Math.sin(a);
      if (x < -6 || x > w + 6 || y < -6 || y > h + 6) continue;
      sctx.globalAlpha = clamp(s.base * (0.55 + 0.45 * Math.sin(t * s.tws + s.tw)), 0, 1);
      if (s.glow) {
        sctx.save(); sctx.shadowColor = "#cfe3ff"; sctx.shadowBlur = 8; sctx.fillStyle = "#eaf2ff";
        sctx.beginPath(); sctx.arc(x, y, s.size + 0.8, 0, Math.PI * 2); sctx.fill(); sctx.restore();
      } else {
        sctx.fillStyle = "#ffffff";
        sctx.beginPath(); sctx.arc(x, y, s.size, 0, Math.PI * 2); sctx.fill();
      }
    }
    sctx.globalAlpha = 1;
  }
  function loop(t) { paintStars(t); requestAnimationFrame(loop); }
  window.addEventListener("resize", () => { initStars(); paintStars(0); });
  initStars();
  paintStars(0);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
